services:
  - type: web
    name: bibliotheque-project
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn bibliotheque_project.wsgi:application
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_SETTINGS_MODULE
        value: bibliotheque_project.settings
      - key: PYTHON_VERSION
        value: 3.12.0